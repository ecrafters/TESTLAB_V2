name: Playwright - TNR Patient (Preprod)

on:
  schedule:
    # 8h, 12h, 16h UTC (Mettez à jour selon votre fuseau horaire)
    - cron: '0 8,12,16 * * *'
  push:
    branches: [main, develop]
    paths:
      - 'tests/Patrimoine_Test_SI_Medical/00_TNR-Patient/**'
      - 'playwright.config.js'
      - 'config/env.*.json'
      - '.github/workflows/playwright-tnr-patient.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tests/Patrimoine_Test_SI_Medical/00_TNR-Patient/**'
      - 'playwright.config.js'
      - 'config/env.*.json'
      - '.github/workflows/playwright-tnr-patient.yml'
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Environnement (preprod, dev, recipe, prod)'
        required: false
        default: 'preprod'

env:
  NODE_ENV: preprod

jobs:
  tnr-patient:
    name: TNR Patient
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run TNR Patient tests (preprod)
        run: npx playwright test tests/Patrimoine_Test_SI_Medical/00_TNR-Patient/
        env:
          NODE_ENV: ${{ github.event.inputs.env_name || 'preprod' }}

      - name: Generate Email Report
        if: always()
        run: |
          # Création du script JS via cat pour éviter les problèmes de quoting dans le YAML
          cat << 'EOF' > generate-report.js
          const fs = require('fs');
          const resultsPath = 'playwright-report/results.json';
          let output = '📋 RÉSULTAT DES TESTS E2E - TNR PATIENT\n\n';

          if (fs.existsSync(resultsPath)) {
            try {
              const data = fs.readFileSync(resultsPath, 'utf8');
              const json = JSON.parse(data);
              const total = json.stats.expected;
              const failed = json.stats.unexpected;
              const passed = total - failed;

              output += `Statut Global: ${failed === 0 ? "✅ SUCCÈS" : "❌ ÉCHEC"}\n`;
              output += `Résumé: ${passed} réussis / ${failed} échoués / ${total} total\n`;
              output += `Durée: ${(json.stats.duration / 1000).toFixed(2)}s\n\n`;
              output += 'DÉTAILS DES TESTS :\n-------------------\n';

              function processSuite(suite) {
                if (suite.specs) {
                  suite.specs.forEach(spec => {
                    const test = spec.tests[0];
                    const result = test.results[test.results.length - 1];
                    const icon = result.status === 'passed' ? '✅' : '❌';
                    output += `${icon} ${spec.title}\n`;

                    if (result.status !== 'passed' && result.error) {
                      // Nettoyage des codes couleurs ANSI (regex simplifiée)
                      let errorMsg = result.error.message.replace(/\u001b\[.*?m/g, '').split('\n')[0];
                      if (errorMsg.length > 300) errorMsg = errorMsg.substring(0, 300) + '...';
                      output += `   ⚠️ Erreur: ${errorMsg}\n`;
                    }
                  });
                }
                if (suite.suites) suite.suites.forEach(processSuite);
              }

              json.suites.forEach(processSuite);

            } catch (e) {
              output += '⚠️ Erreur lors de la lecture du rapport JSON : ' + e.message;
            }
          } else {
            output += '⚠️ Fichier de résultats non trouvé (playwright-report/results.json).';
          }

          const serverUrl = process.env.GITHUB_SERVER_URL;
          const repo = process.env.GITHUB_REPOSITORY;
          const runId = process.env.GITHUB_RUN_ID;
          output += `\n\n🔗 Lien vers le run GitHub :\n${serverUrl}/${repo}/actions/runs/${runId}`;

          fs.writeFileSync('email_body.txt', output);
          console.log('Rapport généré dans email_body.txt');
          EOF
          
          # Exécution du script
          node generate-report.js
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[TESTS E2E] TNR Patient - ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: file://email_body.txt

      - name: Upload reports and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-tnr-patient-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
