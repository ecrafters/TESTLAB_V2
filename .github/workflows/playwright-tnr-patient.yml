name: Playwright - TNR Patient (Preprod)

on:
  # schedule:
    # 8h, 12h, 16h UTC (Mettez à jour selon votre fuseau horaire)
    # - cron: '0 8,12,16 * * *'
  push:
    branches: [main, develop]
    paths:
      - 'tests/Patrimoine_Test_SI_Medical/00_TNR-Patient/**'
      - 'playwright.config.js'
      - 'config/env.*.json'
      - '.github/workflows/playwright-tnr-patient.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tests/Patrimoine_Test_SI_Medical/00_TNR-Patient/**'
      - 'playwright.config.js'
      - 'config/env.*.json'
      - '.github/workflows/playwright-tnr-patient.yml'
  workflow_dispatch:
    inputs:
      env_name:
        description: 'Environnement (preprod, dev, recipe, prod)'
        required: false
        default: 'preprod'

env:
  NODE_ENV: preprod

jobs:
  tnr-patient:
    name: TNR Patient
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run TNR Patient tests (preprod)
        run: npx playwright test tests/Patrimoine_Test_SI_Medical/00_TNR-Patient/
        env:
          NODE_ENV: ${{ github.event.inputs.env_name || 'preprod' }}

      - name: Generate Email Report
        if: always()
        run: |
          # Création du script JS via cat pour éviter les problèmes de quoting dans le YAML
          cat << 'EOF' > generate-report.js
          const fs = require('fs');
          const resultsPath = 'playwright-report/results.json';
          
          // Counters pour les statistiques basées sur les steps
          let stats = {
            total: 0,
            passed: 0,
            failed: 0
          };
          
          let detailsBuffer = ''; // Stocker les détails pour les afficher après le résumé

          if (fs.existsSync(resultsPath)) {
            try {
              const data = fs.readFileSync(resultsPath, 'utf8');
              const json = JSON.parse(data);
              
              detailsBuffer += 'DÉTAILS DES TESTS (STEPS) :\n-----------------------\n';

              function processSuite(suite) {
                if (suite.specs) {
                  suite.specs.forEach(spec => {
                    const test = spec.tests[0];
                    const result = test.results[test.results.length - 1];
                    
                    // Si on a des steps définis (cas test.step(...))
                    if (result.steps && result.steps.length > 0) {
                        result.steps.forEach((step, index) => {
                            // Ignorer les hooks système
                            if (["Before Hooks", "After Hooks", "Worker Cleanup"].some(hook => step.title.includes(hook))) {
                                return;
                            }

                            stats.total++;
                            
                            // Détermination du statut du step
                            // Si le test global est passé, tous les steps sont passés
                            // Si le test global a échoué, on considère que le dernier step exécuté est celui qui a échoué
                            let isStepFailed = false;
                            if (result.status !== 'passed') {
                                // Si c'est le dernier step de la liste et que le test global a échoué
                                if (index === result.steps.length - 1 || (index === result.steps.length - 2 && result.steps[result.steps.length-1].title.includes("Worker Cleanup"))) {
                                    isStepFailed = true;
                                }
                            }

                            if (isStepFailed) {
                                stats.failed++;
                                detailsBuffer += `❌ ${step.title} (${(step.duration / 1000).toFixed(2)}s)\n`;
                            } else {
                                stats.passed++;
                                detailsBuffer += `✅ ${step.title} (${(step.duration / 1000).toFixed(2)}s)\n`;
                            }
                        });
                    } else {
                        // Pas de steps, on compte le test entier comme 1
                        stats.total++;
                        if (result.status === 'passed') {
                            stats.passed++;
                            detailsBuffer += `✅ ${spec.title}\n`;
                        } else {
                            stats.failed++;
                            detailsBuffer += `❌ ${spec.title}\n`;
                        }
                    }

                    // Affichage de l'erreur globale du test si présent
                    if (result.status !== 'passed' && result.error) {
                      let errorMsg = result.error.message.replace(/\u001b\[.*?m/g, '').split('\n')[0];
                      if (errorMsg.length > 300) errorMsg = errorMsg.substring(0, 300) + '...';
                      detailsBuffer += `   ⚠️ Erreur: ${errorMsg}\n\n`;
                    }
                  });
                }
                if (suite.suites) suite.suites.forEach(processSuite);
              }

              json.suites.forEach(processSuite);

            } catch (e) {
              detailsBuffer += '⚠️ Erreur lors de la lecture du rapport JSON : ' + e.message;
            }
          } else {
            detailsBuffer += '⚠️ Fichier de résultats non trouvé (playwright-report/results.json).';
          }

          // Construction du rapport final
          let output = '📋 RÉSULTAT DES TESTS E2E - TNR PATIENT\n\n';
          output += `Statut Global: ${stats.failed === 0 ? "✅ SUCCÈS" : "❌ ÉCHEC"}\n`;
          output += `Résumé (Steps): ${stats.passed} réussis / ${stats.failed} échoués / ${stats.total} total\n\n`;
          
          output += detailsBuffer;

          const serverUrl = process.env.GITHUB_SERVER_URL;
          const repo = process.env.GITHUB_REPOSITORY;
          const runId = process.env.GITHUB_RUN_ID;
          output += `\n\n🔗 Lien vers le run GitHub :\n${serverUrl}/${repo}/actions/runs/${runId}`;

          fs.writeFileSync('email_body.txt', output);
          console.log('Rapport généré dans email_body.txt');
          EOF
          
          # Exécution du script
          node generate-report.js
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[TESTS E2E] TNR Patient - ${{ job.status }}"
          to: ${{ secrets.MAIL_TO }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: file://email_body.txt

      - name: Upload reports and artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-tnr-patient-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 3 # Garde le rapport seulement 3 jours

